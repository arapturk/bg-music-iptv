name: Dynamic IPTV Playlist Auto Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🚀 KRİTİK ADIM: GitHub sunucusuna gizli Chrome tarayıcısını kuruyoruz
    - name: Playwright Tarayıcılarını Kur
      run: npx playwright install chromium --with-deps

    - name: Scripti Çalıştır ve Güncelle
      run: python scraper.py

    - name: Değişiklikleri Taahhüt Et ve Gönder
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Otomatik Güncelleme: playlist.m3u"
        file_pattern: 'playlist.m3u'
