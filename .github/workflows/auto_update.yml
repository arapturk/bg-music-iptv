name: Dynamic IPTV Playlist Auto Update

on:
  schedule:
    # Her gün gece 03:00 TSİ (00:00 UTC) otomatik çalışır
    - cron: '0 0 * * *'
  workflow_dispatch: # Manuel çalıştırmak için

permissions:
  contents: write # Repoya yazma izni

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Scripti Çalıştır ve Güncelle
      run: python scraper.py

    # 🚀 EN GARANTİ ÇÖZÜM: Dosyayı otomatik commit ve push eden hazır eylem
    - name: Değişiklikleri Taahhüt Et ve Gönder
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Otomatik Güncelleme: playlist.m3u"
        file_pattern: 'playlist.m3u'
