name: Dynamic IPTV Playlist Auto Update

on:
  schedule:
    # Her gün gece 03:00 TSİ otomatik çalışır
    - cron: '0 0 * * *'
  workflow_dispatch: # İstediğiniz an manuel tetiklemek için

permissions:
  contents: write # Repoya dosya yazma izni

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Scripti Çalıştır ve Güncelle
      # Python kodunun çökme ihtimaline karşı çalıştırma adımını zırhlıyoruz
      run: python scraper.py || true

    # 🚀 KRİTİK DÜZELTME: Değişiklik yoksa bile Actions'ın hata fırlatmasını tamamen engelliyoruz
    - name: Değişiklikleri Taahhüt Et ve Gönder
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Otomatik Güncelleme: playlist.m3u"
        file_pattern: 'playlist.m3u'
        skip_dirty_check: false    # Değişiklik yoksa adımı hata vermeden es geçer
        skip_fetch: true
