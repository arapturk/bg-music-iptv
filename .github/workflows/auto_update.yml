name: Dynamic IPTV Playlist Auto Update

on:
  schedule:
    # Her gün gece 03:00 TSİ (00:00 UTC) otomatik çalışır
    - cron: '0 0 * * *'
  workflow_dispatch: # İstediğiniz an GitHub panelinden manuel çalıştırmak için

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Scripti Çalıştır ve Güncelle
      run: python scraper.py

    - name: Değişiklikleri GitHub'a Gönder
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        git add playlist.m3u
        # Sadece değişiklik varsa commit et, yoksa hata verme
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Otomatik Güncelleme: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
